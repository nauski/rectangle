# rectangle — example Hyprland config
# Source this from hyprland.conf, or copy the lines you want.

# --- keybindings -------------------------------------------------------------
# Toggle recording with one key: first press draws a rectangle and records,
# second press stops, encodes and drops the result on your clipboard.
bind = $mainMod, R, exec, rectangle

# Explicit variants, if you prefer separate keys / formats:
# bind = $mainMod SHIFT, R, exec, rectangle --mp4 --file --no-clipboard
# bind = $mainMod, G, exec, rectangle gui

# --- window rules ------------------------------------------------------------
# Keep the GUI panel floating, pinned across workspaces, and out of the way so
# it never lands inside your capture region. (Only needed for `rectangle gui`.)
windowrulev2 = float,  title:^(rectangle)$
windowrulev2 = pin,    title:^(rectangle)$
windowrulev2 = move 100%-320 60, title:^(rectangle)$
windowrulev2 = noshadow, title:^(rectangle)$
